<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>BizTextMaker ログイン</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <div class="login-container">
        <img
            src="images/logo.png"
            alt="BizTextMaker"
            class="login-logo">
        <h1>BizTextMaker</h1>

        <form id="loginForm">

            <p>
                <label for="userId">
                    ユーザーID
                </label>

                <input
                    type="text"
                    id="userId"
                    required>
            </p>

            <p>
                <label for="password">
                    パスワード
                </label>

                <input
                    type="password"
                    id="password"
                    required>
            </p>

            <button
                type="submit"
                id="loginButton">
                ログイン
            </button>

        </form>

    </div>

</body>

</html>
